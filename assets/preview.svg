  <rect x="10" y="198" width="624" height="460" rx="13" fill="#02040a" stroke="rgba(99,243,255,0.24)"/>
  <rect x="10" y="198" width="624" height="32" rx="13" fill="rgba(18,29,50,0.86)"/>
  <rect x="20" y="204" width="28" height="20" rx="10" fill="#ffc857"/>
  <text x="34" y="218" fill="#061019" font-family="Inter,sans-serif" font-size="10" font-weight="900" text-anchor="middle">A</text>
  <text x="56" y="215" fill="#e8fbff" font-family="Inter,sans-serif" font-size="12" font-weight="700">sample_input_a.mp4</text>
  <rect x="10" y="238" width="624" height="420" fill="#0a0f1a"/>
  <text x="322" y="448" fill="#63f3ff" font-family="Inter,sans-serif" font-size="14" text-anchor="middle" opacity="0.5">▶ VIDEO A PLAYBACK</text>
  
  <rect x="646" y="198" width="624" height="460" rx="13" fill="#02040a" stroke="rgba(99,243,255,0.24)"/>
  <rect x="646" y="198" width="624" height="32" rx="13" fill="rgba(18,29,50,0.86)"/>
  <rect x="656" y="204" width="28" height="20" rx="10" fill="#ffc857"/>
  <text x="670" y="218" fill="#061019" font-family="Inter,sans-serif" font-size="10" font-weight="900" text-anchor="middle">B</text>
  <text x="692" y="215" fill="#e8fbff" font-family="Inter,sans-serif" font-size="12" font-weight="700">sample_input_b.mp4</text>
  <rect x="646" y="238" width="624" height="420" fill="#0a0f1a"/>
  <text x="958" y="448" fill="#ff4fd8" font-family="Inter,sans-serif" font-size="14" text-anchor="middle" opacity="0.5">▶ VIDEO B PLAYBACK</text>
  
  <!-- Controls Bar -->
  <rect x="10" y="668" width="1260" height="48" rx="15" fill="rgba(8,14,26,0.58)" stroke="rgba(99,243,255,0.34)"/>
  <rect x="24" y="678" width="64" height="28" rx="10" fill="url(#btnGrad)"/>
  <text x="56" y="697" fill="#061019" font-family="Inter,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Play</text>
  <rect x="98" y="678" width="72" height="28" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
  <text x="134" y="697" fill="#e8fbff" font-family="Inter,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Sync Now</text>
  <text x="190" y="697" fill="#87a4b5" font-family="Inter,sans-serif" font-size="11">Seek ▬▬▬▬▬▬▬▬▬▬░░ 00:12.450 / 00:45.200</text>
  <text x="1040" y="697" fill="#ffc857" font-family="Inter,sans-serif" font-size="11" font-weight="600">Audio: A</text>
  
  <!-- Footer Note -->
  <text x="640" y="780" fill="#87a4b5" font-family="Inter,sans-serif" font-size="11" text-anchor="middle">Phase 5: transparente, ausblendbare In-Frame-Controls · Slider direkt im Videobild ziehbar</text>
</svg>