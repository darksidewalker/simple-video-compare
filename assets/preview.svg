<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <radialGradient id="glowTopLeft" cx="0%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#63f3ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBotRight" cx="100%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#ff4fd8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63f3ff"/>
      <stop offset="100%" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#63f3ff" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="800" fill="#05070d"/>
  <rect width="1280" height="800" fill="url(#glowTopLeft)"/>
  <rect width="1280" height="800" fill="url(#glowBotRight)"/>
  
  <!-- Top Bar -->
  <rect x="10" y="10" width="1260" height="56" rx="16" fill="rgba(12,18,32,0.88)" stroke="rgba(99,243,255,0.24)" filter="url(#shadow)"/>
  <text x="30" y="32" fill="#63f3ff" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="0.22em">DASiWA TOOLING</text>
  <text x="30" y="50" fill="#e8fbff" font-family="Inter,sans-serif" font-size="18" font-weight="800">Simple Video Compare</text>
  <circle cx="280" cy="46" r="5" fill="#65ff9a"/>
  
  <!-- Mode Tabs -->
  <g transform="translate(880, 20)">
    <rect x="0" y="0" width="90" height="30" rx="10" fill="url(#btnGrad)"/>
    <text x="45" y="20" fill="#061019" font-family="Inter,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Side by Side</text>
    <rect x="100" y="0" width="64" height="30" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
    <text x="132" y="20" fill="#e8fbff" font-family="Inter,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Slider</text>
    <rect x="174" y="0" width="58" height="30" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
    <text x="203" y="20" fill="#e8fbff" font-family="Inter,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Blend</text>
    <rect x="242" y="0" width="62" height="30" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
    <text x="273" y="20" fill="#e8fbff" font-family="Inter,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Difference</text>
  </g>
  
  <!-- Drop Cards Row -->
  <rect x="10" y="76" width="610" height="58" rx="14" fill="rgba(12,18,32,0.88)" stroke="rgba(99,243,255,0.24)" stroke-dasharray="6 3"/>
  <rect x="24" y="88" width="68" height="22" rx="11" fill="#63f3ff"/>
  <text x="58" y="103" fill="#061019" font-family="Inter,sans-serif" font-size="10" font-weight="900" text-anchor="middle">VIDEO A</text>
  <text x="100" y="94" fill="#e8fbff" font-family="Inter,sans-serif" font-size="12" font-weight="700">Lokale Datei A</text>
  <rect x="100" y="104" width="480" height="22" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
  <text x="112" y="119" fill="#87a4b5" font-family="Inter,sans-serif" font-size="11">Drop file here or paste label/path for notes</text>
  
  <rect x="630" y="76" width="640" height="58" rx="14" fill="rgba(12,18,32,0.88)" stroke="rgba(99,243,255,0.24)" stroke-dasharray="6 3"/>
  <rect x="644" y="88" width="72" height="22" rx="11" fill="#ff4fd8"/>
  <text x="680" y="103" fill="#061019" font-family="Inter,sans-serif" font-size="10" font-weight="900" text-anchor="middle">VIDEO B</text>
  <text x="726" y="94" fill="#e8fbff" font-family="Inter,sans-serif" font-size="12" font-weight="700">Lokale Datei B</text>
  <rect x="726" y="104" width="480" height="22" rx="10" fill="rgba(8,14,26,0.92)" stroke="rgba(99,243,255,0.24)"/>
  <text x="738" y="119" fill="#87a4b5" font-family="Inter,sans-serif" font-size="11">Drop file here or paste label/path for notes</text>
  
  <!-- Runtime Card -->
  <rect x="10" y="142" width="1260" height="44" rx="14" fill="rgba(12,18,32,0.88)" stroke="rgba(99,243,255,0.24)"/>
  <text x="24" y="169" fill="#63f3ff" font-family="Inter,sans-serif" font-size="12" font-weight="700">Runtime</text>
  <text x="90" y="169" fill="#87a4b5" font-family="Inter,sans-serif" font-size="11">ffmpeg ✓ ffprobe ✓ — Go 1.22 • dark-cyber UX</text>
  
