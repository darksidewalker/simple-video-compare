<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DaSiWa Simple Video Compare</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>Simple Video Compare</h1>
      <div class="topbar-drops">
        <article class="drop-compact" id="dropA">
          <span class="badge">A</span>
          <input id="pathA" placeholder="Drop file or paste path">
          <button type="button" id="browseA" class="secondary mini">Browse</button>
        </article>
        <article class="drop-compact" id="dropB">
          <span class="badge accent">B</span>
          <input id="pathB" placeholder="Drop file or paste path">
          <button type="button" id="browseB" class="secondary mini">Browse</button>
        </article>
      </div>
      <div class="topbar-controls">
        <div class="mode-tabs" aria-label="Compare mode">
          <button class="tab active" data-mode="side">Side</button>
          <button class="tab" data-mode="slider">Slider</button>
          <button class="tab" data-mode="blend">Blend</button>
          <button class="tab" data-mode="diff">Diff</button>
          <button id="toggleControlsBtn" class="top-toggle" type="button" title="Toggle viewer controls">Hide controls</button>
          <button id="videoDetailsBtn" class="top-toggle" type="button" title="Show video details" style="display:none;">📋 Details</button>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="statusBtn" type="button" class="status-btn" title="Runtime status">
          <span id="statusDot" class="status-dot"></span>
          <span class="status-text">Runtime</span>
        </button>
        <button id="quitBtn" type="button" class="quit-btn" title="Quit application">✕ Quit</button>
      </div>
    </header>

    <dialog id="runtimeDialog" class="runtime-dialog">
      <div class="runtime-dialog-body">
        <h3>System Status</h3>
        <div id="runtimeSummary"></div>
        <button id="closeRuntime" type="button">Close</button>
      </div>
    </dialog>

    <section class="viewer side-mode" id="viewer">
      <div class="video-panel panel-a">
        <video id="videoA" playsinline preload="auto"></video>
      </div>
      <div class="video-panel panel-b">
        <video id="videoB" playsinline muted preload="auto"></video>
      </div>
      <button id="sliderHandle" class="slider-handle" type="button" aria-label="Move comparison split"></button>
      <div class="video-details-overlay" id="detailsOverlay" hidden>
        <div class="detail-panel left" id="detailPanelA"></div>
        <div class="detail-panel right" id="detailPanelB"></div>
      </div>
      <section class="controls viewer-controls" id="viewerControls">
        <button id="playBtn" class="primary">Play</button>
        <button id="syncBtn">Sync Now</button>
        <label class="range-wrap">Seek <input id="seek" type="range" min="0" max="1000" value="0"></label>
        <label id="blendControl" class="range-wrap mode-control" hidden>Blend <input id="blendRange" type="range" min="0" max="100" value="50"></label>
        <span id="timeLabel">00:00.000 / 00:00.000</span>
        <label>Audio
          <select id="audioMode">
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="mute">Mute</option>
          </select>
        </label>
      </section>
    </section>


    <dialog id="fileBrowserDialog" class="file-dialog">
      <div class="panel-head"><span>LOCAL</span><strong>Datei auswählen</strong><button type="button" id="fileBrowserClose">✕</button></div>
      <div class="browser-toolbar">
        <button type="button" id="fileBrowserUp">Up</button>
        <code id="fileBrowserPath">/</code>
      </div>
      <div id="fileBrowserList" class="file-list"></div>
    </dialog>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/dropzone.js"></script>
  <script src="/js/filebrowser.js"></script>
  <script src="/js/compare.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
